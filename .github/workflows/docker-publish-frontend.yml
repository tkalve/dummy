name: Build and Push dummy-frontend

on:
  push:
    branches:
      - main
    paths:
      - "dummy-frontend/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: tkalve
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push dummy-frontend
        uses: docker/build-push-action@v7
        with:
          context: ./dummy-frontend
          platforms: linux/amd64
          push: true
          tags: tkalve/dummy-frontend:latest
          cache-from: type=gha,scope=dummy-frontend
          cache-to: type=gha,mode=max,scope=dummy-frontend
